<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Links</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', Tahoma, sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  direction:rtl;
}

.container{
  width:100%;
  max-width:420px;
  padding:45px 25px;
  border-radius:26px;
  text-align:center;
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  box-shadow:0 25px 50px rgba(0,0,0,0.3);
  position:relative;
  animation:fadeUp 1s ease;
}

/* RAMADAN DECOR */
.container::before{
  content:"🌙";
  position:absolute;
  top:-18px;
  right:20px;
  font-size:28px;
}

.container::after{
  content:"✨";
  position:absolute;
  bottom:-18px;
  left:20px;
  font-size:22px;
}

.avatar{
  width:115px;
  height:115px;
  border-radius:50%;
  margin:0 auto 15px;
  background-image:url('IMG_20251216_181624_640.jpg');
  background-size:cover;
  background-position:center;
  border:4px solid #f5c77a;
}

h1{
  font-size:26px;
  margin-bottom:6px;
  color:#f5c77a;
}

strong{
  display:block;
  margin-bottom:25px;
  font-size:15px;
  color:#eaeaea;
}

/* LINKS */
.links a{
  display:block;
  text-decoration:none;
  color:#fff;
  background:linear-gradient(135deg,#f5c77a,#d4a84f);
  padding:15px;
  margin-bottom:14px;
  border-radius:16px;
  font-weight:600;
  transition:0.35s;
  box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

.links a:hover{
  transform:translateY(-5px) scale(1.02);
  background:linear-gradient(135deg,#ffd98e,#e3b65c);
}

/* ANIMATION */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(35px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>
