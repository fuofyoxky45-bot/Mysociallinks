  /* أنيميشن التأرجح والنبض الضوئي */
  animation: swing 4s ease-in-out infinite, glow 2s ease-in-out infinite alternate;
}

.fanous::before {
  content: "";
  position: absolute;
  top: -30px;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  height: 30px;
  background: #f5c77a;
}

.f1 { left: 15%; animation-delay: 0s; }
.f2 { left: 50%; animation-delay: 1s; }
.f3 { left: 85%; animation-delay: 2s; }

@keyframes swing {
  0%, 100% { transform: rotate(-6deg); transform-origin: top center; }
  50% { transform: rotate(6deg); transform-origin: top center; }
}

@keyframes glow {
  from { box-shadow: 0 0 15px rgba(255, 210, 125, 0.6), 0 0 30px rgba(255, 210, 125, 0.2); }
  to { box-shadow: 0 0 25px rgba(255, 210, 125, 0.9), 0 0 50px rgba(255, 210, 125, 0.4); }
}

/* ===== CARD (الكارت الرئيسي) ===== */

  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);

@keyframes fadeUp {
